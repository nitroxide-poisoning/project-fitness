<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile App Mock</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* Phone frame */
    .phone {
      width: 390px;
      height: 844px;
      background-color: #0a0a0a;
      border-radius: 48px;
      box-shadow: 0 0 0 12px #111, 0 0 0 14px #333, 0 32px 80px rgba(0,0,0,0.6);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Status bar */
    .status-bar {
      background-color: #0a0a0a;
      color: #fff;
      padding: 14px 28px 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .status-bar .time {
      font-size: 0.85rem;
      font-weight: 700;
    }

    .status-icons {
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: 0.7rem;
    }

    /* Dynamic island */
    .dynamic-island {
      width: 126px;
      height: 34px;
      background-color: #000;
      border-radius: 20px;
      margin: 0 auto 8px;
    }

    /* App header */
    .app-header {
      padding: 12px 24px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #222;
    }

    .app-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
    }

    @keyframes flicker {
      0%, 100% { transform: scale(1) rotate(-3deg); }
      25%       { transform: scale(1.1) rotate(2deg); }
      50%       { transform: scale(0.95) rotate(-2deg); }
      75%       { transform: scale(1.08) rotate(3deg); }
    }

    .streak {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
    }

    .streak .fire {
      font-size: 1.6rem;
      animation: flicker 0.8s ease-in-out infinite;
      display: inline-block;
    }

    .streak .streak-count {
      font-size: 0.65rem;
      font-weight: 700;
      color: #ff6b35;
      margin-top: 1px;
    }

    /* Scrollable content area */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background-color: #0a0a0a;
    }

    .content::-webkit-scrollbar {
      display: none;
    }

    /* Section label */
    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      margin-top: 4px;
    }

    /* Card */
    .card {
      background-color: #fff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .card h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #111;
      margin-bottom: 6px;
    }

    .card p {
      font-size: 0.8rem;
      color: #888;
      line-height: 1.5;
    }

    /* Calories tracker section */
    .calories-widget {
      padding: 8px 4px;
    }

    .calories-widget .widget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .calories-widget .widget-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #999;
    }

    .calories-widget .widget-date {
      font-size: 0.75rem;
      color: #bbb;
    }

    .calories-ring-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .ring-container {
      position: relative;
      width: 140px;
      height: 140px;
      flex-shrink: 0;
    }

    @keyframes pulse-ring {
      0%, 100% { stroke: #ff6b35; }
      50%       { stroke: #cc0000; }
    }

    .ring-container svg {
      transform: rotate(-90deg);
    }

    .ring-progress {
      animation: pulse-ring 1s ease-in-out infinite;
    }

    .ring-label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .ring-label .kcal-value {
      font-size: 1.8rem;
      font-weight: 800;
      color: #fff;
      line-height: 1;
    }

    .ring-label .kcal-unit {
      font-size: 0.7rem;
      color: #aaa;
      margin-top: 2px;
    }

    .calories-stats {
      display: flex;
      justify-content: space-around;
      width: 100%;
    }

    .cal-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .cal-stat-label {
      font-size: 0.7rem;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .cal-stat-label .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .cal-stat-value {
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
    }

    /* Highlight card */
    .card.highlight {
      background: linear-gradient(135deg, #6c63ff, #48cae4);
      color: #fff;
    }

    .card.highlight h2,
    .card.highlight p {
      color: #fff;
    }

    /* Placeholder image block */
    .placeholder-img {
      width: 100%;
      height: 120px;
      background-color: #e8e8e8;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    /* Row of small cards */
    .row {
      display: flex;
      gap: 12px;
    }

    .row .card {
      flex: 1;
      text-align: center;
    }

    .row .card .icon {
      font-size: 1.5rem;
      margin-bottom: 6px;
    }

    /* Bottom nav */
    .bottom-nav {
      background-color: #0a0a0a;
      border-top: 1px solid #222;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 0 24px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      font-size: 0.6rem;
      color: #bbb;
      cursor: pointer;
    }

    .nav-item.active {
      color: #6c63ff;
    }

    .nav-item .nav-icon {
      font-size: 1.3rem;
    }
  </style>
</head>
<body>

  <div class="phone">

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="status-icons">
        <span>●●●</span>
        <span>WiFi</span>
        <span>100%</span>
      </div>
    </div>

    <!-- Dynamic Island -->
    <div class="dynamic-island"></div>

    <!-- App Header -->
    <div class="app-header">
      <h1>Swolemate AI</h1>
      <div class="streak">
        <span class="fire">🔥</span>
        <span class="streak-count">7 days</span>
      </div>
    </div>

    <!-- Scrollable Content -->
    <div class="content">

      <!-- Calories Burned Widget -->
      <div class="calories-widget">
        <div class="widget-header">
          <span class="widget-title">&#128293; Calories Burned</span>
          <span class="widget-date">Today</span>
        </div>
        <div class="calories-ring-row">
          <!-- SVG Ring -->
          <div class="ring-container">
            <svg width="140" height="140" viewBox="0 0 140 140">
              <!-- Background ring -->
              <circle cx="70" cy="70" r="58" fill="none" stroke="#333" stroke-width="12" />
              <!-- Progress ring (75% = stroke-dasharray: 274 365) -->
              <circle class="ring-progress" cx="70" cy="70" r="58" fill="none" stroke="#ff6b35" stroke-width="12"
                stroke-linecap="round"
                stroke-dasharray="274 365" />
            </svg>
            <div class="ring-label">
              <span class="kcal-value">480</span>
              <span class="kcal-unit">kcal burned</span>
            </div>
          </div>
          <!-- Stats breakdown -->
          <div class="calories-stats">
            <!-- Calories Eaten mini ring -->
            <div class="cal-stat">
              <div style="position:relative;width:72px;height:72px;margin-bottom:6px;">
                <svg width="72" height="72" viewBox="0 0 72 72" style="transform:rotate(-90deg);">
                  <circle cx="36" cy="36" r="30" fill="none" stroke="#333" stroke-width="7"/>
                  <circle cx="36" cy="36" r="30" fill="none" stroke="#6c63ff" stroke-width="7"
                    stroke-linecap="round" stroke-dasharray="118 188"/>
                </svg>
                <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
                  <span style="font-size:0.75rem;font-weight:800;color:#fff;line-height:1;">1,240</span>
                  <span style="font-size:0.45rem;color:#aaa;">kcal</span>
                </div>
              </div>
              <span class="cal-stat-label" style="font-size:0.65rem;">Eaten</span>
            </div>
            <!-- Calorie Deficit mini ring -->
            <div class="cal-stat">
              <div style="position:relative;width:72px;height:72px;margin-bottom:6px;">
                <svg width="72" height="72" viewBox="0 0 72 72" style="transform:rotate(-90deg);">
                  <circle cx="36" cy="36" r="30" fill="none" stroke="#333" stroke-width="7"/>
                  <circle cx="36" cy="36" r="30" fill="none" stroke="#48cae4" stroke-width="7"
                    stroke-linecap="round" stroke-dasharray="142 188"/>
                </svg>
                <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
                  <span style="font-size:0.75rem;font-weight:800;color:#fff;line-height:1;">760</span>
                  <span style="font-size:0.45rem;color:#aaa;">kcal</span>
                </div>
              </div>
              <span class="cal-stat-label" style="font-size:0.65rem;">Deficit</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Calories Eaten Widget (compact) -->
      <div style="background:#1a1a1a; border-radius:16px; padding:14px 16px; display:flex; align-items:center; gap:14px;">
        <!-- Small ring -->
        <div style="position:relative; width:64px; height:64px; flex-shrink:0;">
          <svg width="64" height="64" viewBox="0 0 64 64" style="transform:rotate(-90deg);">
            <circle cx="32" cy="32" r="26" fill="none" stroke="#333" stroke-width="7" />
            <circle cx="32" cy="32" r="26" fill="none" stroke="#6c63ff" stroke-width="7"
              stroke-linecap="round" stroke-dasharray="90 164" />
          </svg>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <span style="font-size:0.75rem;font-weight:800;color:#fff;line-height:1;">1,240</span>
            <span style="font-size:0.45rem;color:#aaa;">kcal</span>
          </div>
        </div>
        <!-- Info -->
        <div style="flex:1;">
          <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#999;margin-bottom:6px;">&#127829; Calories Eaten</div>
          <div style="display:flex;gap:16px;margin-bottom:10px;">
            <div>
              <div style="font-size:0.65rem;color:#aaa;">Eaten</div>
              <div style="font-size:0.85rem;font-weight:700;color:#fff;">1,240</div>
            </div>
            <div>
              <div style="font-size:0.65rem;color:#aaa;">Goal</div>
              <div style="font-size:0.85rem;font-weight:700;color:#fff;">2,200</div>
            </div>
            <div>
              <div style="font-size:0.65rem;color:#aaa;">Left</div>
              <div style="font-size:0.85rem;font-weight:700;color:#fff;">960</div>
            </div>
          </div>
          <div style="background:#6c63ff;border-radius:8px;padding:6px 10px;text-align:center;font-size:0.7rem;font-weight:700;color:#fff;cursor:pointer;">
            + Add Meal
          </div>
        </div>
      </div>

      <!-- Steps Widget -->
      <div style="background:#1a1a1a; border-radius:16px; padding:14px 16px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
          <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#999;">&#128099; Steps</div>
          <div style="font-size:0.7rem;color:#bbb;">Today</div>
        </div>
        <div style="display:flex; align-items:flex-end; gap:6px; margin-bottom:10px;">
          <span style="font-size:1.8rem;font-weight:800;color:#fff;line-height:1;">7,342</span>
          <span style="font-size:0.7rem;color:#aaa;margin-bottom:4px;">/ 10,000</span>
        </div>
        <!-- Progress bar -->
        <div style="background:#333;border-radius:999px;height:6px;width:100%;margin-bottom:8px;">
          <div style="background:#48cae4;border-radius:999px;height:6px;width:73%;"></div>
        </div>
        <div style="display:flex; justify-content:space-between;">
          <span style="font-size:0.65rem;color:#aaa;">73% of goal</span>
          <span style="font-size:0.65rem;color:#48cae4;font-weight:600;">2,658 left</span>
        </div>
      </div>

      <!-- Add Workout Button -->
      <div style="background:#ff6b35;border-radius:14px;padding:14px;text-align:center;font-size:0.9rem;font-weight:700;color:#fff;cursor:pointer;letter-spacing:0.02em;">
        &#127947; + Add Workout
      </div>


    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <div class="nav-item active">
        <span class="nav-icon">&#127968;</span>
        <span>Home</span>
      </div>
      <div class="nav-item">
        <span class="nav-icon">&#128269;</span>
        <span>Search</span>
      </div>
      <div class="nav-item">
        <span class="nav-icon">&#43;</span>
        <span>Add</span>
      </div>
      <div class="nav-item">
        <span class="nav-icon">&#128276;</span>
        <span>Alerts</span>
      </div>
      <div class="nav-item">
        <span class="nav-icon">&#128100;</span>
        <span>Profile</span>
      </div>
    </div>

  </div>

</body>
</html>
